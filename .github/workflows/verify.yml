name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: npm run syntax

      - name: Unit tests
        run: npm test

      - name: git-ops self-test (worktree/branch/commit/pr/reap)
        # Builds its own throwaway repo + bare remote + gh stub and sets a repo-local git
        # identity, so no global git config or real gh is needed here.
        run: bash skills/dw-git-ops-skill/scripts/ops-self-test.sh

      - name: runbook lock self-test (mutex, coalesce, stale-takeover)
        run: node skills/dw-runbook-skill/scripts/lock.js --self-test

      - name: runbook runner self-test (modes, pristine guarantee, cache)
        # The self-test builds its own temp repo and sets a local git identity on it,
        # so no global git config is needed here.
        run: node skills/dw-runbook-skill/scripts/run.js --self-test

      - name: runbook hint-hook self-test
        run: node skills/dw-runbook-skill/scripts/dw-runbook-hint.js --self-test

      - name: env preflight self-test (layout, aws creds shape, root resolution)
        # Builds mkdtemp fixtures (fake nested clone, placeholder-only creds file)
        # and drives the real check functions; needs no Docker daemon and no real
        # credentials.
        run: node skills/dw-env-skill/scripts/env-preflight.js --self-test

      - name: handoff nudge-hook self-test (PreCompact fixtures)
        run: node skills/dw-handoff-skill/scripts/dw-handoff-nudge.js --self-test

      - name: deslop rules-engine self-test (scope, overlay, dry-run)
        run: node skills/dw-deslop-skill/scripts/deslop-rules.js --self-test

      - name: Install commands smoke (documented `--` forms, dry-run)
        # Mirrors the documented `npx -y github:owner/repo -- --only ...` commands,
        # plus the legacy `cursor` alias. The leading `--` is the npm/npx separator
        # forwarded to the bin; install.js must tolerate it. Dry-run, no real install.
        run: |
          node bin/install.js -- --dry-run
          node bin/install.js -- --dry-run --only agents
          node bin/install.js -- --dry-run --only claude
          node bin/install.js -- --dry-run --only agents --only claude
          node bin/install.js -- --dry-run --only cursor
          node bin/install.js -- --dry-run --no-hooks

      - name: Packaging smoke
        run: |
          node bin/install.js --list
          node bin/install.js --dry-run --only agents
          node bin/install.js --dry-run --only claude
          for s in dw-flow-skill dw-pr-ready-skill dw-knowledge-skill dw-skill-authoring-skill dw-handoff-skill dw-grilling-skill dw-git-ops-skill dw-deslop-skill dw-team-communication-skill dw-runbook-skill dw-env-skill dw-post-merge-verification-skill; do
            test -f "skills/$s/SKILL.md"
          done
