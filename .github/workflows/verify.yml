name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: |
          node --check bin/install.js
          node --check skills/dw-pr-ready-skill/scripts/utils.js
          node --check skills/dw-pr-ready-skill/scripts/pr-ready-lib.js
          node --check skills/dw-pr-ready-skill/scripts/dw-pr-ready-watch.js
          node --check skills/dw-knowledge-skill/scripts/km-paths.js
          node --check skills/dw-knowledge-skill/scripts/km-frontmatter.js
          node --check skills/dw-knowledge-skill/scripts/km-scrub.js
          node --check skills/dw-knowledge-skill/scripts/km-recall.js
          node --check skills/dw-knowledge-skill/scripts/km-index.js
          node --check skills/dw-knowledge-skill/scripts/km-review.js
          node --check skills/dw-handoff-skill/scripts/dw-handoff-path.js
          node --check skills/dw-git-guardrails-skill/scripts/dw-git-guardrails.js
          node --check skills/dw-runbook-skill/scripts/runbook-paths.js
          node --check skills/dw-runbook-skill/scripts/lock.js
          node --check skills/dw-runbook-skill/scripts/run.js
          node --check skills/dw-runbook-skill/scripts/run-self-test.js
          node --check skills/dw-runbook-skill/scripts/dw-runbook-hint.js

      - name: Unit tests
        run: npm test

      - name: git-guardrails self-test
        run: node skills/dw-git-guardrails-skill/scripts/dw-git-guardrails.js --self-test

      - name: runbook lock self-test (mutex, coalesce, stale-takeover)
        run: node skills/dw-runbook-skill/scripts/lock.js --self-test

      - name: runbook runner self-test (modes, pristine guarantee, cache)
        # The self-test builds its own temp repo and sets a local git identity on it,
        # so no global git config is needed here.
        run: node skills/dw-runbook-skill/scripts/run.js --self-test

      - name: runbook hint-hook self-test
        run: node skills/dw-runbook-skill/scripts/dw-runbook-hint.js --self-test

      - name: Install commands smoke (documented `--` forms, dry-run)
        # Mirrors the documented `npx -y github:owner/repo -- --only ...` commands,
        # plus the legacy `cursor` alias. The leading `--` is the npm/npx separator
        # forwarded to the bin; install.js must tolerate it. Dry-run, no real install.
        run: |
          node bin/install.js -- --dry-run
          node bin/install.js -- --dry-run --only agents
          node bin/install.js -- --dry-run --only claude
          node bin/install.js -- --dry-run --only agents --only claude
          node bin/install.js -- --dry-run --only cursor

      - name: Packaging smoke
        run: |
          node bin/install.js --list
          node bin/install.js --dry-run --only agents
          node bin/install.js --dry-run --only claude
          for s in dw-flow-skill dw-pr-ready-skill dw-knowledge-skill dw-skill-authoring-skill dw-handoff-skill dw-grilling-skill dw-git-guardrails-skill dw-deslop-skill dw-product-decision-skill dw-runbook-skill; do
            test -f "skills/$s/SKILL.md"
          done
